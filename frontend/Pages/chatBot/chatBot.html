<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verifica AI - Proteja-se de Fake News</title>

    <!-- SEO: descrição da página para motores de busca -->
    <meta name="description"
        content="ChatBot do Verifica AI - Interaja com nosso assistente virtual para aprender a identificar golpes, fake news e conteúdos gerados por IA. Desenvolva seu pensamento crítico de forma simples e acessível." />

    <!-- Fontes do Google (Outfit e Plus Jakarta Sans) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@700&family=Plus+Jakarta+Sans:wght@300;400;500;700&display=swap"
        rel="stylesheet" />

    <!-- Estilos: primeiro o global, depois o específico do chatbot -->
    <link rel="stylesheet" href="../../style.css" />
    <link rel="stylesheet" href="chatBot.css" />
</head>

<body>

    <!-- ======================== HEADER ======================== -->
    <header class="headerChatBot">

        <!-- Logo do Verifica AI -->
        <div class="logo">
            <img src="../../assets/verificaai-robot-icon.png" alt="Ícone do Verifica AI" class="logo-icon" />
            <span class="logo-text">Verifica AI</span>
            <img src="../../assets/icons/icone-verificado.png" alt="Verificado" class="icon-verified" />
        </div>

        <!-- Botão para fechar o chat e voltar à landing page -->
        <button class="btn-close" id="btnClose" type="button" aria-label="Fechar chat">
            <svg viewBox="0 0 24 24" width="15" height="15">
                <path d="M6 6l12 12M18 6L6 18" stroke="#fff" stroke-width="2.4" stroke-linecap="round" />
            </svg>
        </button>

    </header>

    <!-- ======================== ÁREA DE MENSAGENS ======================== -->
    <main class="chat-messages" id="chatMessages">
        <div class="chat-messages-inner" id="chatMessagesInner">

            <!-- Estado inicial exibido enquanto o chat está vazio -->
            <div class="empty-state" id="emptyState">
                <p class="empty-title">Antes de confiar, verifique.</p>
                <p class="empty-sub">Esta IA serve apenas como auxílio, e pode cometer erros! Utilize mais de uma fonte
                    para confirmar</p>
            </div>

        </div>
    </main>

    <!-- ======================== FOOTER / INPUT ======================== -->
    <footer class="footerChatBot">

        <!-- Preview do arquivo anexado (visível só quando há anexo) -->
        <div class="attachment-preview" id="attachmentPreview" hidden>
            <img src="../../assets/icons/attach-white.png" alt="" />
            <span id="attachmentName"></span>
            <button type="button" id="removeAttachment" aria-label="Remover anexo">
                <svg viewBox="0 0 24 24" width="13" height="13">
                    <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" />
                </svg>
            </button>
        </div>

        <!-- Formulário de envio: anexo + texto + botão enviar -->
        <form class="chat-area" id="chatForm">
            <label class="attach-label" for="fileInput" title="Anexar arquivo">
                <img src="../../assets/icons/attach-white.png" alt="Anexar arquivo" />
            </label>
            <input type="file" id="fileInput" hidden accept="image/*,video/*,audio/*" />
            <input type="text" id="textInput" class="chat-input" placeholder="Insira um texto ou envie um arquivo..."
                autocomplete="off" />
            <button type="submit" class="send-btn" aria-label="Enviar">
                <img src="../../assets/icons/send-white.png" alt="" />
            </button>
        </form>

    </footer>

    <!-- Script do chatbot (sem type="module", pois não usa import) -->
    <script src="chatbot.js"></script>

</body>

</html>
